services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_PATH: /data/db.sqlite
      PORT: "4000"
    ports:
      - "4000:4000"
    volumes:
      - dbdata:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  dbdata:
